<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shallebs Agency</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <img src="logo.jpg" alt="Shallebs Logo" style="width: 110px; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
            <h2 style="font-size: 1.6rem; letter-spacing: 1px; margin-bottom: 5px;">
                <span style="color: #039be5;">SHALLEBS</span> 
                <span style="color: #fb8c00;">TRAVEL AGENCY</span>
            </h2>
            <p style="font-family: 'Arial', cursive; font-size: 0.9rem; color: #039be5; font-style: italic; margin-bottom: 15px;">"....explore the new World with us"</p>
            <hr>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="test@gmail.com">
                </div>
                <div class="form-group password-group" style="position: relative;">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                    <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer; color: #777; font-size: 1.1rem; padding: 5px;">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
                <button type="submit" class="btn-save">Secure Login</button>
            </form>
            <p id="login-error" style="color: red; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
