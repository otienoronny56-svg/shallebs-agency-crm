<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shallebs Agency</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <img src="logo.png" alt="Shallebs Logo" style="width: 100px; margin-bottom: 15px;">
            <h2>SHALLEBS</h2>
            <p>Travel & Agency Management</p>
            <hr>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="admin@shallebs.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-save">Secure Login</button>
            </form>
            <p id="login-error" style="color: red; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
